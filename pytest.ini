[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Slow tests are deselected by default. Run them explicitly with `pytest -m slow`
# (locally or in a dedicated CI job). See FR-20260430-quantum-skip-slow-tests.
addopts = -v --tb=short -m "not slow"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"', re-select with '-m slow')
